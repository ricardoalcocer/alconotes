<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http: asset:; script-src 'self'" />
    <title>Untitled</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="titlebar-drag"></div>
      <nav id="tabbar"></nav>
      <div id="toolbar">
        <button type="button" id="tb-outline" title="Toggle Outline (⌘⇧O)" aria-pressed="false">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M2 3h12a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Zm.5 1.5v7h3.4v-7H2.5Zm4.4 0v7h6.6v-7H6.9Z"/></svg>
        </button>
        <span class="tb-sep"></span>
        <button type="button" data-format="h1" title="Heading 1 (⌘⌥1)">H1</button>
        <button type="button" data-format="h2" title="Heading 2 (⌘⌥2)">H2</button>
        <button type="button" data-format="h3" title="Heading 3 (⌘⌥3)">H3</button>
        <span class="tb-sep"></span>
        <button type="button" data-format="bold" title="Bold (⌘B)"><span class="g-bold">B</span></button>
        <button type="button" data-format="italic" title="Italic (⌘I)"><span class="g-italic">I</span></button>
        <button type="button" data-format="code" title="Inline Code (⌘K)"><span class="g-code">&lt;/&gt;</span></button>
        <button type="button" data-format="mark" title="Highlight (⌘⇧H)"><span class="g-mark">H</span></button>
        <span class="tb-sep"></span>
        <button type="button" data-format="link" title="Link (⌘⇧K)">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M9.4 6.6a3.2 3.2 0 0 1 0 4.5l-2.3 2.3a3.2 3.2 0 0 1-4.5-4.5l1.5-1.5 1 1-1.5 1.5a1.8 1.8 0 0 0 2.5 2.5l2.3-2.3a1.8 1.8 0 0 0 0-2.5l1-1Zm-2.8 2.8a3.2 3.2 0 0 1 0-4.5l2.3-2.3a3.2 3.2 0 0 1 4.5 4.5l-1.5 1.5-1-1 1.5-1.5a1.8 1.8 0 0 0-2.5-2.5L7.6 5.9a1.8 1.8 0 0 0 0 2.5l-1 1Z"/></svg>
        </button>
        <button type="button" data-format="image" title="Image (⌘⇧I)">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M2 3h12a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Zm.5 1.5v7h11v-7h-11ZM5 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2Zm-1.5 5h9l-3-4-2.25 3-1.25-1.5-2.5 2.5Z"/></svg>
        </button>
        <button type="button" id="tb-table" title="Insert Table (⌘⇧T)" aria-haspopup="true" aria-expanded="false">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M2 3h12v10H2V3Zm1 1v2h10V4H3Zm0 3v2h4.5V7H3Zm5.5 0v2H13V7H8.5ZM3 10v2h4.5v-2H3Zm5.5 0v2H13v-2H8.5Z"/></svg>
        </button>
        <div id="table-picker" hidden>
          <div id="table-picker-grid"></div>
          <div id="table-picker-label">Insert table</div>
        </div>
        <span class="tb-sep"></span>
        <button type="button" data-format="ul" title="Bulleted List (⌘⇧8)">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M3 3.6h1.6v1.6H3V3.6Zm3.4.3H13v1H6.4v-1ZM3 7.2h1.6v1.6H3V7.2Zm3.4.3H13v1H6.4v-1ZM3 10.8h1.6v1.6H3v-1.6Zm3.4.3H13v1H6.4v-1Z"/></svg>
        </button>
        <button type="button" data-format="ol" title="Numbered List (⌘⇧7)">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M6.4 3.9H13v1H6.4v-1Zm0 3.6H13v1H6.4v-1Zm0 3.6H13v1H6.4v-1ZM3.9 2.8v2.4h-.8V3.7l-.6.3v-.8l.9-.4h.5Zm-1.4 4h1.9v.7l-1 .9h1v.7h-2v-.7l1-.9h-.9v-.7Zm0 3.6h1.9v1.1l-.4.4.4.4v1.1H2.5v-.7h1.1v-.4l-.5-.4.5-.4v-.4H2.5v-.7Z"/></svg>
        </button>
        <button type="button" data-format="task" title="Checkbox (⌘⇧X)">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M3 2h10a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1Zm.5 1.5v9h9v-9h-9Zm1.6 4.4 1-1 1.6 1.6 3.2-3.2 1 1-4.2 4.2-2.6-2.6Z"/></svg>
        </button>
        <button type="button" data-format="quote" title="Blockquote (⌘⇧.)">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M3.5 4H6a1 1 0 0 1 1 1v3.5A3.5 3.5 0 0 1 3.5 12v-1.4c1 0 1.9-.7 2-1.6H3.5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Zm6.5 0h2.5a1 1 0 0 1 1 1v3.5a3.5 3.5 0 0 1-3.5 3.5v-1.4c1 0 1.9-.7 2-1.6H10a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Z"/></svg>
        </button>
      </div>
      <main id="workspace" class="view-split">
        <aside id="outline-pane" hidden>
          <div id="outline-title">Outline</div>
          <div id="outline"></div>
        </aside>
        <div id="outline-resizer" hidden></div>
        <section id="editor-pane">
          <div id="editor"></div>
        </section>
        <div id="divider"></div>
        <section id="preview-pane">
          <article id="preview" class="markdown-body"></article>
        </section>
      </main>
      <footer id="statusbar">
        <span id="status-cursor">Ln 1, Col 1</span>
        <span class="sep">·</span>
        <span id="status-sel">0 selected</span>
        <span class="spacer"></span>
        <span id="status-words">0 words</span>
        <span class="sep">·</span>
        <span id="status-chars">0 chars</span>
        <span class="sep">·</span>
        <span id="status-eol">LF</span>
        <button id="toggle-preview" type="button" title="Toggle Preview (⌘⇧P)" aria-pressed="false">
          <svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
            <path fill="currentColor" d="M8 3C4.5 3 1.7 5.1.6 8c1.1 2.9 3.9 5 7.4 5s6.3-2.1 7.4-5C14.3 5.1 11.5 3 8 3Zm0 8.3A3.3 3.3 0 1 1 8 4.7a3.3 3.3 0 0 1 0 6.6Zm0-5.3A2 2 0 1 0 8 10a2 2 0 0 0 0-4Z"/>
          </svg>
          <span>Preview</span>
        </button>
      </footer>
    </div>
    <script src="dist/renderer.js"></script>
  </body>
</html>
